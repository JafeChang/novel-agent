app = "novel-agent"
primary_region = "hkg"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "novel_data"
  destination = "/data"

[deploy]
  release_command = "python -c 'from app.core.database import engine, Base; Base.metadata.create_all(bind=engine)'"
