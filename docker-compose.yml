version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: novel-agent-db
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel
      POSTGRES_DB: novel_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novel-network

  minio:
    image: minio/minio:latest
    container_name: novel-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novel-network

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/novel-agent --ignore-existing;
      mc anonymous set download myminio/novel-agent;
      exit 0;
      "
    networks:
      - novel-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-agent-backend
    environment:
      DATABASE_URL: postgresql://novel:novel@postgres:5432/novel_agent
      SECRET_KEY: novel-agent-secret-key-change-in-production
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: novel-agent
      OPENCODE_API_URL: http://host.docker.internal:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - novel-network

  frontend:
    image: node:20-alpine
    container_name: novel-agent-frontend
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - novel-network

volumes:
  postgres_data:
  minio_data:

networks:
  novel-network:
    driver: bridge
