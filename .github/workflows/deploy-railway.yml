name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: |
          wget -q https://github.com/railwayapp/cli/releases/download/v4.33.0/railway-v4.33.0-amd64.deb
          dpkg -i railway-v4.33.0-amd64.deb || apt-get install -f -y
          railway version

      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
