name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/railwayapp/cli/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
          curl -fsSL https://github.com/railwayapp/cli/releases/download/$VERSION/railway-$VERSION-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          mv railway /usr/local/bin/
          railway version

      - name: Login to Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
        
      - name: Deploy
        run: |
          railway up --service novel-agent --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
